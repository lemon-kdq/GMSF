<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>核心技术路线 — GT Pose Batch Optimization</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1b1f2a;
      --border:  #2e3446;
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --green:   #a6e3a1;
      --yellow:  #f9e2af;
      --orange:  #fab387;
      --teal:    #94e2d5;
      --purple:  #cba6f7;
      --blue:    #89b4fa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 600px;
    }
    header h1 { font-size: 1.7rem; font-weight: 700; color: var(--blue); margin-bottom: 0.4rem; }
    header p  { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    /* ── diagram ────────────────────────────── */
    .diagram {
      max-width: 1100px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .track { display: flex; flex-direction: column; gap: 0; }

    .row { display: flex; align-items: center; gap: 0; }

    .node {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* node colours */
    .n-imu   { border-color: rgba(166,227,161,0.4);  color: var(--green);  }
    .n-vqf   { border-color: rgba(249,226,175,0.4);  color: var(--yellow); }
    .n-dr    { border-color: rgba(250,179,135,0.4);  color: var(--orange); }
    .n-lidar { border-color: rgba(148,226,213,0.4);  color: var(--teal);   }
    .n-kf    { border-color: rgba(148,226,213,0.4);  color: var(--teal);   }
    .n-dsk   { border-color: rgba(148,226,213,0.4);  color: var(--teal);   }
    .n-gtsam { border-color: rgba(203,166,247,0.4);  color: var(--purple); }
    .n-smth  { border-color: rgba(137,180,250,0.4);  color: var(--blue);   }
    .n-out   { border-color: rgba(137,180,250,0.5);  color: var(--blue); background: rgba(137,180,250,0.06); }

    /* branch pills */
    .branch-pill {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .pill-imu   { background: rgba(166,227,161,0.12); color: var(--green);  border: 1px solid rgba(166,227,161,0.3); }
    .pill-lidar { background: rgba(148,226,213,0.12); color: var(--teal);   border: 1px solid rgba(148,226,213,0.3); }
    .pill-core  { background: rgba(203,166,247,0.12); color: var(--purple); border: 1px solid rgba(203,166,247,0.3); }

    .arrow { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.2rem; padding: 0 0.5rem; flex-shrink: 0; }
    .spacer { height: 8px; }

    /* ── joiner arrows from both branches ─── */
    .join-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }

    /* horizontal bar bridging the two branches */
    .hbar-center {
      height: 1px;
      background: var(--border);
    }

    /* stubs pointing down to the merge bar */
    .stub-top    { height: 6px; border-top: 1px solid var(--border); }
    .stub-bottom { height: 6px; border-top: 1px solid var(--border); }

    /* ── output ─────────────────────────────── */
    .output-row { display: flex; align-items: center; justify-content: center; gap: 0; }

    /* ── legend ─────────────────────────────── */
    .legend {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.4rem;
      justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.78rem; color: var(--muted); }
    .legend-pill { width: 10px; height: 10px; border-radius: 50%; }

    @media (max-width: 600px) {
      .node { font-size: 0.74rem; padding: 0.45rem 0.7rem; }
      .arrow { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>核心技术路线</h1>
  <p>IMU · 轮速计 · LiDAR 多传感器融合流水线</p>
</header>

<div class="diagram">

  <!-- ══ IMU 支路 ══════════════════════════════ -->
  <div class="track">
    <div class="row">
      <div class="branch-pill pill-imu">IMU</div>
      <div class="arrow">→</div>
      <div class="node n-imu">IMU 原始数据</div>
      <div class="arrow">→</div>
      <div class="node n-vqf">VQF 姿态估计</div>
      <div class="arrow">→</div>
      <div class="node n-dr">IMU + 轮速航位推算</div>
      <div class="arrow">→</div>
      <div class="node n-dr">初始轨迹</div>
    </div>
  </div>

  <div class="spacer"></div>
  <div class="spacer"></div>

  <!-- ══ LiDAR 支路 ════════════════════════════ -->
  <div class="track">
    <div class="row">
      <div class="branch-pill pill-lidar">LiDAR</div>
      <div class="arrow">→</div>
      <div class="node n-lidar">LiDAR 点云</div>
      <div class="arrow">→</div>
      <div class="node n-kf">关键帧选择</div>
      <div class="arrow">→</div>
      <div class="node n-dsk">点云正畸</div>
    </div>
  </div>

  <div class="spacer"></div>
  <div class="spacer"></div>

  <!-- ══ 两条支路汇聚 → GTSAM ══════════════════ -->
  <div class="join-wrap">
    <!-- horizontal merge bar -->
    <div class="hbar-center" style="width:580px"></div>
    <!-- top stub: INIT → merge bar -->
    <div style="display:flex;width:580px">
      <div style="flex:1"></div>
      <div class="stub-top" style="width:120px"></div>
      <div style="width:160px"></div>
    </div>
    <!-- bottom stub: DESKEW → merge bar -->
    <div style="display:flex;width:580px">
      <div style="flex:1"></div>
      <div class="stub-bottom" style="width:120px"></div>
      <div style="width:160px"></div>
    </div>

    <!-- merge to GTSAM -->
    <div class="output-row">
      <div class="branch-pill pill-core">核心</div>
      <div class="arrow">→</div>
      <div class="node n-gtsam">GTSAM 批量图优化</div>
      <div class="arrow">→</div>
      <div class="node n-smth">IMU 插值平滑</div>
      <div class="arrow">→</div>
      <div class="node n-out">全频平滑轨迹 ✅</div>
    </div>
  </div>

</div>

<!-- ══ legend ════════════════════════════════════ -->
<div class="legend">
  <div class="legend-item"><div class="legend-pill" style="background:#a6e3a1"></div>IMU 支路</div>
  <div class="legend-item"><div class="legend-pill" style="background:#94e2d5"></div>LiDAR 支路</div>
  <div class="legend-item"><div class="legend-pill" style="background:#cba6f7"></div>核心优化</div>
</div>

</body>
</html>
